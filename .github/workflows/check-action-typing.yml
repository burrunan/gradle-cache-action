name: Check Action Typing

on:
    push:
      paths:
        - 'action.yml'
        - 'action-types.yml'
    pull_request:
      paths:
        - 'action.yml'
        - 'action-types.yml'

jobs:
    check_action_typing:
        name: Check Action Typing
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Check Action Typing
              uses: krzema12/github-actions-typing@9ddf35b71a482be7d8922b28e8d00df16b77e315 # v2.2.2
